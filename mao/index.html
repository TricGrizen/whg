<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>文化宫</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="/whg/apple-touch-icon.png" />
<style>
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:radial-gradient(140% 100% at 50% 0%,#f6f4ed 60%,#edeade 100%);font-family:system-ui,-apple-system,sans-serif;color:#201b15}
  img{width:88px;height:88px;border-radius:22px}
  h1{font-size:22px;letter-spacing:.3em;margin:0 0 0 .3em;font-weight:600}
  a{display:block;padding:14px 44px;background:#a63b2a;color:#f6f4ed;border-radius:12px;text-decoration:none;font-size:19px;letter-spacing:.15em}
  p{color:#756c5d;font-size:15px;margin:0;padding:0 30px;text-align:center;line-height:1.7}
</style>
</head>
<body>
<img src="/whg/icon-192.png" alt="" />
<h1>文化宫</h1>
<a href="/whg/">进 门</a>
<p>第一次来：先点浏览器的「分享」→「添加到主屏幕」，<br />以后从桌面图标进来，就是你的专座。</p>
<script>
  // 踩过这块门垫即入住"小猫"；从桌面（独立窗口）启动时直接进门
  localStorage.setItem('whg.role', '小猫')
  if (navigator.standalone) location.replace('/whg/')
</script>
